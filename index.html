<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muebles Yao y Ado</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* HEADER */
header {
    background: linear-gradient(90deg, #0d6efd, #00c6ff);
    color: white;
    text-align: center;
    padding: 40px 20px;
}

header h1 {
    margin: 0;
    font-size: 32px;
}

/* SECCIONES */
section {
    padding: 30px;
    text-align: center;
}

.servicios {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: white;
    margin: 15px;
    padding: 20px;
    width: 250px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* BOTÓN */
.boton {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: #25D366;
    color: white;
    text-decoration: none;
    border-radius: 30px;
    font-weight: bold;
}

/* GALERÍA */
.galeria {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.galeria img {
    width: 250px;
    height: 180px;
    object-fit: cover;
    margin: 10px;
    border-radius: 10px;
}

/* FOOTER */
footer {
    background: #111;
    color: white;
    padding: 20px;
}
</style>

</head>

<body>

<header>
    <h1>Muebles Yao y Ado</h1>
    <p>Calidad, confianza y soluciones a tu medida</p>
</header>

<section>
    <h2>Servicios</h2>

    <div class="servicios">
        <div class="card">
            <h3>Muebles a medida</h3>
            <p>Diseños modernos y personalizados</p>
        </div>

        <div class="card">
            <h3>Reparaciones</h3>
            <p>Electricidad, plomería y más</p>
        </div>

        <div class="card">
            <h3>Instalaciones</h3>
            <p>Aires, TV, equipos</p>
        </div>
    </div>

    <a class="boton" href="https://wa.me/18090000000" target="_blank">
        Contactar por WhatsApp
    </a>
</section>

<section>
    <h2>Galería de trabajos</h2>

    <div class="galeria">
        <img src="https://via.placeholder.com/300">
        <img src="https://via.placeholder.com/300">
        <img src="https://via.placeholder.com/300">
    </div>
</section>

<footer>
    <p>📞 809-000-0000</p>
    <p>Santiago, República Dominicana</p>
</footer>

</body>
</html>

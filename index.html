<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Muebles Yao y Ado</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* HERO */
.hero {
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1470');
    background-size: cover;
    background-position: center;
    color: white;
    text-align: center;
    padding: 120px 20px;
}

.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 25px;
    background: #25D366;
    color: white;
    text-decoration: none;
    border-radius: 30px;
}

/* SECCIONES */
section {
    padding: 40px;
    text-align: center;
}

/* BOTONES MENU */
.menu a {
    margin: 10px;
    padding: 10px 20px;
    background: #007BFF;
    color: white;
    text-decoration: none;
    border-radius: 20px;
    transition: 0.3s;
}

.menu a:hover {
    transform: scale(1.1);
}

/* CARDS */
.card {
    background: #f5f5f5;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="hero">
    <h1>Muebles Yao y Ado</h1>
    <p>Fabricación y restauración de muebles con calidad profesional</p>

    <a class="btn" href="https://wa.me/18293319722">Contactar ahora</a>
</div>

<section>
    <h2>¿Qué hacemos?</h2>

    <div class="card">Fabricación de muebles a medida</div>
    <div class="card">Restauración de muebles antiguos</div>
    <div class="card">Instalaciones y reparaciones</div>
</section>

<section class="menu">
    <h2>Ver Catálogos</h2>

    <a href="muebles.html">Muebles</a>
    <a href="reparaciones.html">Restauración</a>
    <a href="instalaciones.html">Instalaciones</a>
</section>
<div id="rating">
  <p>Califica nuestro servicio:</p>

  <span onclick="rate(1)">⭐</span>
  <span onclick="rate(2)">⭐</span>
  <span onclick="rate(3)">⭐</span>
  <span onclick="rate(4)">⭐</span>
  <span onclick="rate(5)">⭐</span>

  <p id="result"></p>
</div>

<script>
function rate(value) {
    document.getElementById("result").innerText =
    "Gracias por calificar con " + value + " estrellas ⭐";
}
</script>

</body>
</html>
